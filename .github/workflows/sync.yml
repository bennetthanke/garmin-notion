name: Garmin to Notion Sync

on:
  schedule:
   - cron: '17 9 * * *'   # 5:17 AM ET (EDT) - off-the-hour jitter
   - cron: '17 0 * * *'   # 8:17 PM ET (EDT)
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days back to sync (overrides GARMIN_DAYS_BACK var)"
        default: ""
        required: false

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore Garmin tokens
        uses: actions/cache/restore@v4
        id: garmin-tokens
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
          restore-keys: |
            garmin-tokens-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Add jitter
        if: github.event_name == 'schedule'
        run: |
          JITTER=$((RANDOM % 600))
          echo "Sleeping ${JITTER}s before hitting Garmin."
          sleep $JITTER

      - name: Run sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GARMIN_TOKENSTORE: ~/.garmin_tokens
          TIMEZONE: ${{ vars.TIMEZONE }}
          GARMIN_DAYS_BACK: ${{ vars.GARMIN_DAYS_BACK }}
          PYTHONPATH: src
        run: python -m garmin_to_notion all -v

      - name: Save Garmin tokens
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
