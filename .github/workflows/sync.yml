name: Garmin to Notion Sync

on:
  schedule:
    - cron: '0 9 * * *'   # 5 AM ET (EDT) / 4 AM ET (EST)
    - cron: '0 16 * * *'  # 12 PM ET (EDT) / 11 AM ET (EST)
    - cron: '0 0 * * *'   # 8 PM ET (EDT) / 7 PM ET (EST)
  workflow_dispatch:

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: $ runner.os -pip-$ hashFiles('requirements.txt') 
          restore-keys: |
            $ runner.os -pip-

      - name: Restore Garmin tokens
        uses: actions/cache@v4
        id: garmin-tokens
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
          restore-keys: |
            garmin-tokens-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanity check secrets
        run: |
          if [ -z "$ secrets.NOTION_TOKEN " ]; then
            echo "::error::NOTION_TOKEN is empty"; exit 1
          fi
          if [ -z "$ secrets.GARMIN_EMAIL " ] || [ -z "$ secrets.GARMIN_PASSWORD " ]; then
            echo "::error::Garmin credentials missing"; exit 1
          fi
          echo "NOTION_TOKEN length: ${#NOTION_TOKEN}"
          echo "Token prefix: ${NOTION_TOKEN:0:4}..."
        env:
          NOTION_TOKEN: $ secrets.NOTION_TOKEN 

      - name: Verify Notion integration sees Fitness Tracker DBs
        run: |
          python - <<'PY'
          import os, sys, requests
          token = os.environ["NOTION_TOKEN"]
          h = {"Authorization": f"Bearer {token}",
               "Notion-Version": "2022-06-28",
               "Content-Type": "application/json"}
          want = {"Activities","Personal Records","Daily Steps","Sleep",
                  "Fitness Summary","Workouts","Activity Summary"}
          found = set()
          cursor = None
          while True:
              body = {"filter":{"property":"object","value":"database"},"page_size":100}
              if cursor: body["start_cursor"] = cursor
              r = requests.post("https://api.notion.com/v1/search", headers=h, json=body, timeout=30)
              r.raise_for_status()
              data = r.json()
              for res in data.get("results", []):
                  title = "".join(t.get("plain_text","") for t in res.get("title",[]))
                  if title in want: found.add(title)
              if not data.get("has_more"): break
              cursor = data.get("next_cursor")
          missing = want - found
          print(f"Found: {sorted(found)}")
          if missing:
              print(f"::error::Missing or not shared with integration: {sorted(missing)}")
              sys.exit(1)
          PY
        env:
          NOTION_TOKEN: $ secrets.NOTION_TOKEN 

      - name: Run sync (verbose)
        env:
          GARMIN_EMAIL: $ secrets.GARMIN_EMAIL 
          GARMIN_PASSWORD: $ secrets.GARMIN_PASSWORD 
          GARMIN_TOKENS: $ secrets.GARMIN_TOKENS 
          NOTION_TOKEN: $ secrets.NOTION_TOKEN 
          GARMIN_TOKENSTORE: ~/.garmin_tokens
          TIMEZONE: $ vars.TIMEZONE 
          GARMIN_DAYS_BACK: $ vars.GARMIN_DAYS_BACK 
          PYTHONPATH: src
        run: python -m garmin_to_notion all -v

      - name: Save Garmin tokens
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1