name: Garmin to Notion Sync

on:
  schedule:
    - cron: '0 9 * * *'   # 5 AM ET (EDT) / 4 AM ET (EST)
    - cron: '0 16 * * *'  # 12 PM ET (EDT) / 11 AM ET (EST)
    - cron: '0 0 * * *'   # 8 PM ET (EDT) / 7 PM ET (EST)
  workflow_dispatch:

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore Garmin tokens
        uses: actions/cache@v4
        id: garmin-tokens
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
          restore-keys: |
            garmin-tokens-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GARMIN_TOKENSTORE: ~/.garmin_tokens
          TIMEZONE: ${{ vars.TIMEZONE }}
          GARMIN_DAYS_BACK: ${{ vars.GARMIN_DAYS_BACK }}
          PYTHONPATH: src
        run: python -m garmin_to_notion all -v

      - name: Save Garmin tokens
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
